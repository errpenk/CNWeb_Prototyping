name: PHP Lint

on:
  push:
    branches:
      - main
    paths:
      - 'wordpress-plugins/**/*.php'
      - 'wordpress-plugins/luxureat-github-sync/README.md'
      - 'tools/build-github-sync-plugin.mjs'
      - 'tools/verify-github-sync-plugin.mjs'
      - '.github/workflows/php-lint.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'wordpress-plugins/**/*.php'
      - 'wordpress-plugins/luxureat-github-sync/README.md'
      - 'tools/build-github-sync-plugin.mjs'
      - 'tools/verify-github-sync-plugin.mjs'
      - '.github/workflows/php-lint.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Lint plugin PHP
        run: |
          find wordpress-plugins -name '*.php' -print0 | xargs -0 -n 1 php -l

      - name: Build and verify plugin zip
        run: |
          node tools/build-github-sync-plugin.mjs "$GITHUB_WORKSPACE"
          node tools/verify-github-sync-plugin.mjs "$GITHUB_WORKSPACE"
